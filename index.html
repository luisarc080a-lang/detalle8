<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Abdy 💙</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sapphire: #0a2a7a; --sapphire-mid: #1a4ab8; --sapphire-light: #5090f0;
    --gold: #C9A96E; --accent-violet: #4a20a0;
  }
  html, body { width: 100%; overflow-x: hidden; }
  body { background: #edf1ff; font-family: 'Cormorant Garamond', serif; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 70% 55% at 15% 8%, #c8d8ff88 0%, transparent 55%),
                radial-gradient(ellipse 60% 70% at 85% 92%, #b0c4ff77 0%, transparent 55%),
                radial-gradient(ellipse 50% 50% at 50% 50%, #e8eeffaa 0%, transparent 65%);
    pointer-events: none; z-index: 0;
  }
  .petals-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
  .petal { position: absolute; top: -50px; opacity: 0; animation: fall linear infinite; }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
    5%   { opacity: 0.65; }
    50%  { transform: translateY(55vh) rotate(360deg) translateX(20px); opacity: 0.5; }
    100% { transform: translateY(115vh) rotate(720deg) translateX(-15px); opacity: 0; }
  }
  .page {
    position: relative; z-index: 2; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px 20px 60px;
  }
  .top-ornament {
    font-size: 1rem; letter-spacing: 0.55em; color: var(--gold); text-transform: uppercase;
    opacity: 0; animation: fadeUp 1s ease forwards 0.2s; margin-bottom: 4px; font-weight: 300;
  }
  .bouquet-wrap {
    width: min(520px, 96vw);
    opacity: 0; animation: fadeUp 1s ease forwards 0.4s;
    filter: drop-shadow(0 16px 40px rgba(20,60,160,0.2));
  }
  .title-block { text-align: center; opacity: 0; animation: fadeUp 1s ease forwards 1s; margin-top: 2px; }
  .title-main {
    font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 7vw, 4.2rem);
    font-style: italic; color: var(--sapphire); line-height: 1.1;
    text-shadow: 0 2px 24px rgba(26,74,184,0.15);
  }
  .title-main span { color: var(--accent-violet); }
  .divider {
    display: flex; align-items: center; gap: 14px; margin: 16px 0 14px;
    opacity: 0; animation: fadeUp 1s ease forwards 1.3s;
  }
  .divider-line { width: 80px; height: 1px; background: linear-gradient(90deg, transparent, var(--gold)); }
  .divider-line.right { background: linear-gradient(90deg, var(--gold), transparent); }
  .divider-diamond { width: 8px; height: 8px; background: var(--gold); transform: rotate(45deg); }
  .message-card {
    max-width: 520px; width: 100%; background: rgba(255,255,255,0.80);
    backdrop-filter: blur(14px); border: 1px solid rgba(26,74,184,0.2); border-radius: 2px;
    padding: 30px 38px; text-align: center; position: relative;
    opacity: 0; animation: fadeUp 1s ease forwards 1.6s;
    box-shadow: 0 4px 32px rgba(26,74,184,0.07);
  }
  .message-card::before, .message-card::after {
    content: ''; position: absolute; width: 22px; height: 22px;
    border-color: var(--gold); border-style: solid; opacity: 0.5;
  }
  .message-card::before { top: 9px; left: 9px; border-width: 1px 0 0 1px; }
  .message-card::after  { bottom: 9px; right: 9px; border-width: 0 1px 1px 0; }
  .message-text { font-size: clamp(1.05rem, 2.4vw, 1.2rem); color: #1a2a5a; line-height: 1.9; font-weight: 300; }
  .message-text em { color: var(--sapphire-mid); font-style: italic; font-size: 1.1em; }
  .date-badge {
    margin-top: 20px; display: inline-flex; align-items: center; gap: 10px;
    font-size: 0.78rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold);
    opacity: 0; animation: fadeUp 1s ease forwards 2s;
  }
  .date-dot { width: 4px; height: 4px; background: var(--sapphire-light); border-radius: 50%; }
  #music-btn {
    position: fixed; bottom: 22px; right: 22px; width: 46px; height: 46px; border-radius: 50%;
    background: rgba(255,255,255,0.88); backdrop-filter: blur(10px);
    border: 1px solid rgba(26,74,184,0.25); box-shadow: 0 4px 20px rgba(26,74,184,0.18);
    cursor: pointer; font-size: 1.3rem; color: var(--sapphire);
    display: flex; align-items: center; justify-content: center; z-index: 999;
    transition: transform 0.2s; opacity: 0; animation: fadeUp 1s ease forwards 2.5s;
  }
  #music-btn:hover { transform: scale(1.12); }
  #music-btn.playing { animation: pulse 2s ease-in-out infinite; opacity: 1; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 4px 20px rgba(26,74,184,0.18); }
    50%      { box-shadow: 0 4px 28px rgba(26,74,184,0.45); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  /* Each flower blooms in */
  .fl { animation: flIn 0.9s cubic-bezier(.3,1.5,.6,1) both; }
  .f1{animation-delay:.3s} .f2{animation-delay:.45s} .f3{animation-delay:.55s}
  .f4{animation-delay:.65s} .f5{animation-delay:.5s}  .f6{animation-delay:.72s}
  .f7{animation-delay:.4s}  .f8{animation-delay:.6s}  .f9{animation-delay:.38s}
  @keyframes flIn {
    from { opacity:0; transform: scale(0.1); }
    to   { opacity:1; transform: scale(1); }
  }
  .sway { transform-origin: 50% 100%; animation: sway 5s ease-in-out infinite; }
  @keyframes sway {
    0%,100%{ transform:rotate(0deg); }
    35%    { transform:rotate(1.2deg); }
    70%    { transform:rotate(-1.2deg); }
  }
  .sp { animation: spAnim 3s ease-in-out infinite; opacity:0; }
  @keyframes spAnim {
    0%,100%{opacity:0;transform:scale(.3) rotate(0deg);}
    50%    {opacity:1;transform:scale(1) rotate(180deg);}
  }
</style>
</head>

    Admiro tu fuerza, tu voluntad y tu personalidad,<br>
    tu presencia genera luz.<br><br>

  <div class="date-dot"></div>

  <source src="Cuando_Estás_Aquí.mp3" type="audio/mpeg">
</audio>

<!-- Music button -->
<button id="music-btn" title="Música" aria-label="Reproducir música">
  <span id="music-icon">♪</span>
</button>

</div>

<script>
  // Falling petals
  const container = document.getElementById('petals');
  const cols = ['#ffaabb','#ff88aa','#ffd0dd','#dd6699aa','#ffddee','#ffffff99','#cc99ffaa','#ffe0cc88','#99ccffaa'];
  for (let i = 0; i < 36; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const left = Math.random() * 100;
    const size = 10 + Math.random() * 20;
    const dur  = 9  + Math.random() * 14;
    const del  = Math.random() * 20;
    const col  = cols[Math.floor(Math.random() * cols.length)];
    p.style.left = left + 'vw';
    p.style.animationDuration = dur + 's';
    p.style.animationDelay    = del + 's';
    p.innerHTML = `<svg width="${size}" height="${size*1.4}" viewBox="0 0 ${size} ${size*1.4}">
      <ellipse cx="${size/2}" cy="${size*.68}" rx="${size*.42}" ry="${size*.68}" fill="${col}"/></svg>`;
    container.appendChild(p);
  }

  // Music — archivo local musica.mp3
  const audio = document.getElementById('bg-audio');
  const btn   = document.getElementById('music-btn');
  const icon  = document.getElementById('music-icon');
  let playing = false;

  function toggleMusic() {
    if (!playing) {
      audio.play();
      btn.classList.add('playing');
      icon.textContent = '♫';
      playing = true;
    } else {
      audio.pause();
      btn.classList.remove('playing');
      icon.textContent = '♪';
      playing = false;
    }
  }

  btn.addEventListener('click', toggleMusic);

  // Intenta reproducir automáticamente al cargar
  function autoplay() {
    audio.play().then(() => {
      btn.classList.add('playing');
      icon.textContent = '♫';
      playing = true;
    }).catch(() => {
      // El navegador bloqueó el autoplay — espera el primer toque
      document.addEventListener('click', function go() {
        if (!playing) toggleMusic();
        document.removeEventListener('click', go);
      }, { once: true });
      document.addEventListener('touchstart', function go() {
        if (!playing) toggleMusic();
        document.removeEventListener('touchstart', go);
      }, { once: true });
    });
  }

  window.addEventListener('load', autoplay);
</script>
